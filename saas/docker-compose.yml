# OpenClaw Agent OS SaaS - Docker Compose
version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: agent-os-db
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos123
      POSTGRES_DB: agent_os_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agent-os-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: agent-os-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agent-os-network

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-os-backend
    environment:
      DATABASE_URL: postgresql://agentos:agentos123@postgres:5432/agent_os_saas
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-in-production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/app/src
    networks:
      - agent-os-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 前端静态文件（使用nginx）
  frontend:
    image: nginx:alpine
    container_name: agent-os-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agent-os-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-os-network:
    driver: bridge
