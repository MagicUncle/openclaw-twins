            /* Budget table with inline limit editor */
            function BudgetTable({ sorted, token, onSaved }) {
                const [editingId, setEditingId] = useState(null);
                const [editVal, setEditVal] = useState("");
                const [editNote, setEditNote] = useState("");
                const [saving, setSaving] = useState(false);
                const [saveMsg, setSaveMsg] = useState(null);
                const [sortBy, setSortBy] = useState("usage_percent");

                const sortedLocal = [...sorted].sort(
                    (a, b) => (b[sortBy] || 0) - (a[sortBy] || 0),
                );

                const startEdit = (m) => {
                    setEditingId(m.scope_id);
                    setEditVal(String(m.limit || 100000));
                    setEditNote("");
                    setSaveMsg(null);
                };

                const cancelEdit = () => {
                    setEditingId(null);
                    setSaveMsg(null);
                };

                const saveLimit = async (agentId) => {
                    if (!token) return;
                    const newLimit = parseInt(
                        editVal.replace(/[^\d]/g, ""),
                        10,
                    );
                    if (!newLimit || newLimit < 1000) {
                        setSaveMsg({
                            ok: false,
                            text: "配额至少 1,000 tokens",
                        });
                        return;
                    }
                    setSaving(true);
                    try {
                        const r = await fetch(
                            `${API_BASE}/budget/config/agent/${agentId}`,
                            {
                                method: "PUT",
                                headers: {
                                    "Content-Type": "application/json",
                                    Authorization: `Bearer ${token}`,
                                },
                                body: JSON.stringify({
                                    limit: newLimit,
                                    manual_override: true,
                                    note: editNote,
                                }),
                            },
                        );
                        if (r.ok) {
                            setSaveMsg({
                                ok: true,
                                text: `已保存 ${agentId}: ${fmtTok(newLimit)}`,
                            });
                            setTimeout(() => {
                                setEditingId(null);
                                setSaveMsg(null);
                                onSaved();
                            }, 1200);
                        } else {
                            const e = await r.json();
                            setSaveMsg({
                                ok: false,
                                text: e.detail || "保存失败",
                            });
                        }
                    } catch (e) {
                        setSaveMsg({ ok: false, text: e.message });
                    } finally {
                        setSaving(false);
                    }
                };

                return (
                    <div className="card overflow-h">
                        <div className="card-hd">
                            <div className="card-title">
                                <IcList size={13} />
                                详细明细
                                <span
                                    style={{
                                        fontSize: ".6rem",
                                        color: "var(--text-3)",
                                        fontWeight: 400,
                                        marginLeft: 4,
                                    }}
                                >
                                    点击行可手动设置配额
                                </span>
                            </div>
                            <div className="flex g2">
                                <span className="xs dim">排序:</span>
                                {[
                                    ["usage_percent", "使用率"],
                                    ["used", "Token 量"],
                                    ["estimated_cost", "成本"],
                                ].map(([k, l]) => (
                                    <button
                                        key={k}
                                        onClick={() => setSortBy(k)}
                                        className={`pill${sortBy === k ? " pa" : ""}`}
                                    >
                                        {l}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {saveMsg && (
                            <div
                                style={{
                                    padding: ".45rem 1rem",
                                    fontSize: ".74rem",
                                    fontFamily: "var(--fm)",
                                    background: saveMsg.ok
                                        ? "var(--green-d)"
                                        : "var(--red-d)",
                                    color: saveMsg.ok
                                        ? "var(--green)"
                                        : "var(--red)",
                                    borderBottom: "1px solid var(--border)",
                                }}
                            >
                                {saveMsg.ok ? "✓ " : "✗ "}
                                {saveMsg.text}
                            </div>
                        )}

                        <div className="tbl-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Agent</th>
                                        <th className="r">已用 Tokens</th>
                                        <th className="r">配额上限</th>
                                        <th>使用率</th>
                                        <th className="r">预估成本</th>
                                        <th className="c">状态</th>
                                        <th className="c">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedLocal.map((m) => {
                                        const over = m.status === "over",
                                            warn = m.status === "warn";
                                        const col = over
                                            ? "var(--red)"
                                            : warn
                                              ? "var(--amber)"
                                              : "var(--green)";
                                        const isEditing =
                                            editingId === m.scope_id;
                                        return (
                                            <React.Fragment key={m.scope_id}>
                                                <tr
                                                    style={
                                                        isEditing
                                                            ? {
                                                                  background:
                                                                      "rgba(59,130,246,.04)",
                                                              }
                                                            : {}
                                                    }
                                                >
                                                    <td className="fw6 mono">
                                                        {m.scope_id}
                                                    </td>
                                                    <td className="r mono">
                                                        {fmtTok(m.used)}
                                                    </td>
                                                    <td className="r mono">
                                                        {fmtTok(m.limit)}
                                                        <span className="dyn-tag">
                                                            动态
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <div className="flex aic g2">
                                                            <div
                                                                className="bar-wrap"
                                                                style={{
                                                                    width: 88,
                                                                    flexShrink: 0,
                                                                }}
                                                            >
                                                                <div
                                                                    className={`bar ${over ? "r" : warn ? "a" : "g"}`}
                                                                    style={{
                                                                        width: `${Math.min(m.usage_percent || 0, 100)}%`,
                                                                    }}
                                                                />
                                                            </div>
                                                            <span
                                                                className="mono xs fw7"
                                                                style={{
                                                                    color: col,
                                                                }}
                                                            >
                                                                {(
                                                                    m.usage_percent ||
                                                                    0
                                                                ).toFixed(1)}
                                                                %
                                                            </span>
                                                        </div>
                                                    </td>
                                                    <td className="r mono">
                                                        {toRMB(
                                                            m.estimated_cost,
                                                        )}
                                                    </td>
                                                    <td className="c">
                                                        <span
                                                            className={`badge ${over ? "b-red" : warn ? "b-amber" : "b-green"}`}
                                                        >
                                                            {over
                                                                ? "超限"
                                                                : warn
                                                                  ? "警告"
                                                                  : "正常"}
                                                        </span>
                                                    </td>
                                                    <td className="c">
                                                        <button
                                                            className={`expand-btn${isEditing ? " open" : ""}`}
                                                            onClick={() =>
                                                                isEditing
                                                                    ? cancelEdit()
                                                                    : startEdit(
                                                                          m,
                                                                      )
                                                            }
                                                        >
                                                            {isEditing
                                                                ? "取消"
                                                                : "设置"}
                                                        </button>
                                                    </td>
                                                </tr>
                                                {isEditing && (
                                                    <tr className="budget-edit-row">
                                                        <td colSpan={7}>
                                                            <div
                                                                className="flex aic g3"
                                                                style={{
                                                                    flexWrap:
                                                                        "wrap",
                                                                }}
                                                            >
                                                                <span
                                                                    className="xs dim"
                                                                    style={{
                                                                        fontFamily:
                                                                            "var(--fm)",
                                                                    }}
                                                                >
                                                                    新配额（tokens）:
                                                                </span>
                                                                <input
                                                                    className="limit-input"
                                                                    type="text"
                                                                    value={
                                                                        editVal
                                                                    }
                                                                    onChange={(
                                                                        e,
                                                                    ) =>
                                                                        setEditVal(
                                                                            e
                                                                                .target
                                                                                .value,
                                                                        )
                                                                    }
                                                                    onKeyDown={(
                                                                        e,
                                                                    ) =>
                                                                        e.key ===
                                                                            "Enter" &&
                                                                        saveLimit(
                                                                            m.scope_id,
                                                                        )
                                                                    }
                                                                    placeholder="如 200000"
                                                                    autoFocus
                                                                />
                                                                <span
                                                                    className="xs dim"
                                                                    style={{
                                                                        fontFamily:
                                                                            "var(--fm)",
                                                                    }}
                                                                >
                                                                    备注:
                                                                </span>
                                                                <input
                                                                    className="limit-input"
                                                                    style={{
                                                                        width: 160,
                                                                    }}
                                                                    type="text"
                                                                    value={
                                                                        editNote
                                                                    }
                                                                    onChange={(
                                                                        e,
                                                                    ) =>
                                                                        setEditNote(
                                                                            e
                                                                                .target
                                                                                .value,
                                                                        )
                                                                    }
                                                                    placeholder="可选备注"
                                                                />
                                                                <button
                                                                    className="btn-save"
                                                                    disabled={
                                                                        saving
                                                                    }
                                                                    onClick={() =>
                                                                        saveLimit(
                                                                            m.scope_id,
                                                                        )
                                                                    }
                                                                >
                                                                    {saving
                                                                        ? "保存中…"
                                                                        : "确认保存"}
                                                                </button>
                                                                <button
                                                                    className="btn-cancel"
                                                                    onClick={
                                                                        cancelEdit
                                                                    }
                                                                >
                                                                    取消
                                                                </button>
                                                                <div
                                                                    className="flex g2"
                                                                    style={{
                                                                        marginLeft:
                                                                            "auto",
                                                                        flexWrap:
                                                                            "wrap",
                                                                    }}
                                                                >
                                                                    {[
                                                                        50000,
                                                                        100000,
                                                                        200000,
                                                                        500000,
                                                                    ].map(
                                                                        (v) => (
                                                                            <button
                                                                                key={
                                                                                    v
                                                                                }
                                                                                onClick={() =>
                                                                                    setEditVal(
                                                                                        String(
                                                                                            v,
                                                                                        ),
                                                                                    )
                                                                                }
                                                                                style={{
                                                                                    fontSize:
                                                                                        ".65rem",
                                                                                    fontFamily:
                                                                                        "var(--fm)",
                                                                                    fontWeight: 700,
                                                                                    padding:
                                                                                        "2px 7px",
                                                                                    borderRadius: 4,
                                                                                    cursor: "pointer",
                                                                                    border: "1px solid var(--border-md)",
                                                                                    background:
                                                                                        "transparent",
                                                                                    color: "var(--text-3)",
                                                                                    transition:
                                                                                        "all var(--t)",
                                                                                }}
                                                                            >
                                                                                {fmtTok(
                                                                                    v,
                                                                                )}
                                                                            </button>
                                                                        ),
                                                                    )}
                                                                </div>
                                                            </div>
                                                            <div
                                                                className="xs dim mt2"
                                                                style={{
                                                                    fontFamily:
                                                                        "var(--fm)",
                                                                }}
                                                            >
                                                                当前:{" "}
                                                                {fmtTok(
                                                                    m.limit,
                                                                )}{" "}
                                                                → 已使用{" "}
                                                                {(
                                                                    m.usage_percent ||
                                                                    0
                                                                ).toFixed(1)}
                                                                % ·
                                                                设置后立即生效（手动覆盖，关闭动态调整）
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            /* ════════════════════════════════════════════════════════
       PROPOSALS PAGE
    ════════════════════════════════════════════════════════ */
            function ProposalsPage({ proposals, sysStatus, token, onRefresh }) {
                const [fStatus, setFStatus] = useState("all");
                const [fPriority, setFPriority] = useState("all");
                const [actLoading, setActLoading] = useState(null);
                const [actMsg, setActMsg] = useState(null);
                const [expandedId, setExpandedId] = useState(null);
                const [detailCache, setDetailCache] = useState({});
                const [detailLoading, setDetailLoading] = useState(null);

                const filtered = proposals.filter((p) => {
                    const st = p._status || p.status || "pending";
                    const pr = p.priority || "";
                    return (
                        (fStatus === "all" || st === fStatus) &&
                        (fPriority === "all" || pr === fPriority)
                    );
                });

                const toggleDetail = async (id) => {
                    if (expandedId === id) {
                        setExpandedId(null);
                        return;
                    }
                    setExpandedId(id);
                    if (detailCache[id]) return;
                    setDetailLoading(id);
                    try {
                        const d = await apiFetch(`/proposals/${id}`, token);
                        setDetailCache((prev) => ({ ...prev, [id]: d }));
                    } catch (e) {
                        // fallback: use basic data from proposals list
                    } finally {
                        setDetailLoading(null);
                    }
                };

                const doAction = async (id, action) => {
                    if (!token) return;
                    setActLoading(id + action);
                    try {
                        const r = await fetch(
                            `${API_BASE}/proposals/${id}/${action}`,
                            {
                                method: "POST",
                                headers: { Authorization: `Bearer ${token}` },
                            },
                        );
                        if (r.ok) {
                            setActMsg({
                                ok: true,
                                text: `提案 ${id} 已${action === "approve" ? "批准" : "拒绝"}`,
                            });
                            setTimeout(() => {
                                setActMsg(null);
                                onRefresh();
                            }, 1600);
                        } else {
                            const e = await r.json();
                            setActMsg({
                                ok: false,
                                text: e.detail || "操作失败",
                            });
                        }
                    } catch (e) {
                        setActMsg({ ok: false, text: e.message });
                    } finally {
                        setActLoading(null);
                    }
                };

                const pending = proposals.filter(
                    (p) => (p._status || p.status || "pending") === "pending",
                ).length;
                const approved = proposals.filter(
                    (p) => (p._status || p.status) === "approved",
                ).length;
                const applied = proposals.filter(
                    (p) => (p._status || p.status) === "applied",
                ).length;
                const rejected = proposals.filter(
                    (p) => (p._status || p.status) === "rejected",
                ).length;

                return (
                    <div>
                        <div className="page-hd">
                            <div>
                                <div className="page-title">优化提案</div>
                                <div className="page-sub">
                                    Architect 自动生成 · 人工审批执行
                                </div>
                            </div>
                            <div className="page-meta">
                                {proposals.length} 个提案
                            </div>
                        </div>

                        {/* Stats */}
                        <div className="grid4 mb6">
                            {[
                                { l: "待处理", v: pending, c: "c-amber" },
                                { l: "已批准", v: approved, c: "c-green" },
                                { l: "已应用", v: applied, c: "c-purple" },
                                { l: "已拒绝", v: rejected, c: "c-red" },
                            ].map((x) => (
                                <div key={x.l} className={`sc ${x.c}`}>
                                    <div className="sc-label">{x.l}</div>
                                    <div className="sc-val">{x.v}</div>
                                </div>
                            ))}
                        </div>

                        {/* Flow */}
                        <div className="card mb5">
                            <div className="card-hd">
                                <div className="card-title">
                                    <IcSpark size={13} />
                                    自进化流程
                                </div>
                            </div>
                            <div className="card-body">
                                <div className="flow">
                                    {[
                                        {
                                            ico: (
                                                <IcCpu
                                                    size={20}
                                                    style={{
                                                        color: "var(--blue)",
                                                    }}
                                                />
                                            ),
                                            t: "监控",
                                            d: "Twin A 采集",
                                        },
                                        {
                                            ico: (
                                                <IcList
                                                    size={20}
                                                    style={{
                                                        color: "var(--cyan)",
                                                    }}
                                                />
                                            ),
                                            t: "分析",
                                            d: "识别缺口",
                                        },
                                        {
                                            ico: (
                                                <IcSpark
                                                    size={20}
                                                    style={{
                                                        color: "var(--purple)",
                                                    }}
                                                />
                                            ),
                                            t: "生成",
                                            d: "Twin B 提案",
                                        },
                                        {
                                            ico: (
                                                <IcCheck
                                                    size={20}
                                                    style={{
                                                        color: "var(--green)",
                                                    }}
                                                />
                                            ),
                                            t: "审批",
                                            d: "人工确认",
                                        },
                                        {
                                            ico: (
                                                <IcZap
                                                    size={20}
                                                    style={{
                                                        color: "var(--amber)",
                                                    }}
                                                />
                                            ),
                                            t: "执行",
                                            d: "自动应用",
                                        },
                                    ].map((s, i) => (
                                        <React.Fragment key={i}>
                                            <div className="flow-step">
                                                <div className="flow-ico">
                                                    {s.ico}
                                                </div>
                                                <div className="flow-t">
                                                    {s.t}
                                                </div>
                                                <div className="flow-d">
                                                    {s.d}
                                                </div>
                                            </div>
                                            {i < 4 && (
                                                <span className="flow-arr">
                                                    ›
                                                </span>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Action message */}
                        {actMsg && (
                            <div
                                className={`alert-item mb4 ${actMsg.ok ? "ai-ok" : "ai-crit"}`}
                            >
                                <div className="alert-hd">
                                    {actMsg.ok ? (
                                        <IcCheck
                                            size={13}
                                            style={{ color: "var(--green)" }}
                                        />
                                    ) : (
                                        <IcX
                                            size={13}
                                            style={{ color: "var(--red)" }}
                                        />
                                    )}
                                    {actMsg.text}
                                </div>
                            </div>
                        )}

                        {/* Filters */}
                        <div
                            className="flex aic g3 mb5"
                            style={{ flexWrap: "wrap" }}
                        >
                            <div className="flex aic g2">
                                <span className="xs dim">状态:</span>
                                {[
                                    ["all", "全部"],
                                    ["pending", "待处理"],
                                    ["approved", "已批准"],
                                    ["rejected", "已拒绝"],
                                    ["applied", "已应用"],
                                ].map(([v, l]) => (
                                    <button
                                        key={v}
                                        onClick={() => setFStatus(v)}
                                        className={`pill${fStatus === v ? " pa" : ""}`}
                                    >
                                        {l}
                                    </button>
                                ))}
                            </div>
                            <div className="flex aic g2">
                                <span className="xs dim">优先级:</span>
                                {[
                                    ["all", "全部"],
                                    ["P0", "P0"],
                                    ["P1", "P1"],
                                    ["P2", "P2"],
                                ].map(([v, l]) => (
                                    <button
                                        key={v}
                                        onClick={() => setFPriority(v)}
                                        className={`pill${fPriority === v ? " pb" : ""}`}
                                    >
                                        {l}
                                    </button>
                                ))}
                            </div>
                            <span
                                className="xs dim"
                                style={{ marginLeft: "auto" }}
                            >
                                {filtered.length} / {proposals.length}
                            </span>
                        </div>

                        {/* Proposal cards */}
                        {filtered.length === 0 ? (
                            <Empty
                                icon={<IcSpark size={36} />}
                                title="没有符合条件的提案"
                                desc="尝试调整过滤条件"
                            />
                        ) : (
                            <div className="grid2">
                                {filtered.map((p) => {
                                    const tid = typeLook(p.type);
                                    const sid = statusLook(
                                        p._status || p.status || "pending",
                                    );
                                    const prio = p.priority || "P1";
                                    const isPending =
                                        (p._status || p.status || "pending") ===
                                        "pending";
                                    const prioCol =
                                        prio === "P0"
                                            ? "b-red"
                                            : prio === "P1"
                                              ? "b-amber"
                                              : "b-gray";
                                    const isExpanded = expandedId === p.id;
                                    const detail = detailCache[p.id] || p;
                                    const isLoadingDetail =
                                        detailLoading === p.id;

                                    return (
                                        <div key={p.id} className="prop-card">
                                            {/* ── Card header ── */}
                                            <div className="flex aic jsb mb2">
                                                <div
                                                    style={{
                                                        flex: 1,
                                                        marginRight: ".5rem",
                                                    }}
                                                >
                                                    <div className="prop-title">
                                                        {p.title}
                                                    </div>
                                                    {p.target && (
                                                        <div className="prop-target">
                                                            目标: {p.target}
                                                        </div>
                                                    )}
                                                </div>
                                                <span
                                                    className={`badge ${prioCol}`}
                                                >
                                                    {prio}
                                                </span>
                                            </div>

                                            {/* ── Problem summary ── */}
                                            {p.problem && (
                                                <div className="prop-problem">
                                                    {p.problem}
                                                </div>
                                            )}

                                            {/* ── Footer: badges + actions ── */}
                                            <div
                                                className="flex aic jsb"
                                                style={{
                                                    flexWrap: "wrap",
                                                    gap: ".4rem",
                                                }}
                                            >
                                                <div
                                                    className="flex g2"
                                                    style={{ flexWrap: "wrap" }}
                                                >
                                                    <span
                                                        className={`badge ${tid.cls}`}
                                                    >
                                                        {tid.text}
                                                    </span>
                                                    <span
                                                        className={`badge ${sid.cls}`}
                                                    >
                                                        {sid.text}
                                                    </span>
                                                    {p.created_at && (
                                                        <span className="badge b-gray">
                                                            {fmtDate(
                                                                p.created_at,
                                                            )}
                                                        </span>
                                                    )}
                                                </div>
                                                <div
                                                    className="flex g2"
                                                    style={{ flexShrink: 0 }}
                                                >
                                                    {/* Detail toggle */}
                                                    <button
                                                        className={`expand-btn${isExpanded ? " open" : ""}`}
                                                        onClick={() =>
                                                            toggleDetail(p.id)
                                                        }
                                                    >
                                                        {isLoadingDetail
                                                            ? "…"
                                                            : isExpanded
                                                              ? "▲ 收起"
                                                              : "▼ 详情"}
                                                    </button>
                                                    {isPending && token && (
                                                        <>
                                                            <button
                                                                disabled={
                                                                    !!actLoading
                                                                }
                                                                onClick={() =>
                                                                    doAction(
                                                                        p.id,
                                                                        "approve",
                                                                    )
                                                                }
                                                                className="btn-ok"
                                                            >
                                                                {actLoading ===
                                                                p.id + "approve"
                                                                    ? "…"
                                                                    : "批准"}
                                                            </button>
                                                            <button
                                                                disabled={
                                                                    !!actLoading
                                                                }
                                                                onClick={() =>
                                                                    doAction(
                                                                        p.id,
                                                                        "reject",
                                                                    )
                                                                }
                                                                className="btn-no"
                                                            >
                                                                {actLoading ===
                                                                p.id + "reject"
                                                                    ? "…"
                                                                    : "拒绝"}
                                                            </button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {/* ── Expanded detail panel ── */}
                                            {isExpanded && (
                                                <div className="prop-detail">
                                                    {/* Problem detail */}
                                                    <div className="detail-section">
                                                        <div className="detail-label">
                                                            <IcWarn
                                                                size={11}
                                                                style={{
                                                                    color: "var(--red)",
                                                                }}
                                                            />
                                                            问题详情
                                                        </div>
                                                        <div
                                                            className="detail-text"
                                                            style={{
                                                                marginBottom:
                                                                    ".4rem",
                                                            }}
                                                        >
                                                            {detail.problem ||
                                                                p.problem ||
                                                                "—"}
                                                        </div>
                                                        {/* problem_metrics */}
                                                        {detail.problem_metrics && (
                                                            <div>
                                                                {Object.entries(
                                                                    detail.problem_metrics,
                                                                ).map(
                                                                    ([
                                                                        k,
                                                                        v,
                                                                    ]) => (
                                                                        <span
                                                                            key={
                                                                                k
                                                                            }
                                                                            className="metric-pill"
                                                                        >
                                                                            <span
                                                                                style={{
                                                                                    color: "var(--text-3)",
                                                                                }}
                                                                            >
                                                                                {
                                                                                    k
                                                                                }

                                                                                :
                                                                            </span>
                                                                            <span
                                                                                style={{
                                                                                    color: "var(--text)",
                                                                                    fontWeight: 700,
                                                                                }}
                                                                            >
                                                                                {typeof v ===
                                                                                    "number" &&
                                                                                v <
                                                                                    1 &&
                                                                                v >
                                                                                    0
                                                                                    ? (
                                                                                          v *
                                                                                          100
                                                                                      ).toFixed(
                                                                                          1,
                                                                                      ) +
                                                                                      "%"
                                                                                    : String(
                                                                                          v,
                                                                                      )}
                                                                            </span>
                                                                        </span>
                                                                    ),
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Risk assessment */}
                                                    <div className="detail-section">
                                                        <div className="detail-label">
                                                            <IcWarn
                                                                size={11}
                                                                style={{
                                                                    color: "var(--amber)",
                                                                }}
                                                            />
                                                            风险评估
                                                        </div>
                                                        <div>
                                                            <div className="risk-row">
                                                                <span className="risk-lbl">
                                                                    实施难度
                                                                </span>
                                                                <span
                                                                    className={`badge ${
                                                                        detail.effort ===
                                                                        "high"
                                                                            ? "b-red"
                                                                            : detail.effort ===
                                                                                "medium"
                                                                              ? "b-amber"
                                                                              : "b-green"
                                                                    }`}
                                                                >
                                                                    {detail.effort ===
                                                                    "high"
                                                                        ? "高"
                                                                        : detail.effort ===
                                                                            "medium"
                                                                          ? "中"
                                                                          : detail.effort ===
                                                                              "low"
                                                                            ? "低"
                                                                            : detail.effort ||
                                                                              "—"}
                                                                </span>
                                                            </div>
                                                            <div className="risk-row">
                                                                <span className="risk-lbl">
                                                                    预期影响
                                                                </span>
                                                                <span
                                                                    className={`badge ${
                                                                        detail.impact ===
                                                                        "high"
                                                                            ? "b-green"
                                                                            : detail.impact ===
                                                                                "medium"
                                                                              ? "b-blue"
                                                                              : "b-gray"
                                                                    }`}
                                                                >
                                                                    {detail.impact ===
                                                                    "high"
                                                                        ? "高收益"
                                                                        : detail.impact ===
                                                                            "medium"
                                                                          ? "中等"
                                                                          : detail.impact ===
                                                                              "low"
                                                                            ? "低"
                                                                            : detail.impact ||
                                                                              "—"}
                                                                </span>
                                                            </div>
                                                            <div className="risk-row">
                                                                <span className="risk-lbl">
                                                                    需要审批
                                                                </span>
                                                                <span
                                                                    className={`badge ${detail.requires_approval !== false ? "b-amber" : "b-green"}`}
                                                                >
                                                                    {detail.requires_approval !==
                                                                    false
                                                                        ? "是（高风险操作）"
                                                                        : "否（可自动执行）"}
                                                                </span>
                                                            </div>
                                                            {detail.auto_apply ===
                                                                false && (
                                                                <div className="risk-row">
                                                                    <span className="risk-lbl">
                                                                        自动部署
                                                                    </span>
                                                                    <span className="badge b-gray">
                                                                        禁用（需手动批准后执行）
                                                                    </span>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* Solutions */}
                                                    {detail.solutions &&
                                                        detail.solutions
                                                            .length > 0 && (
                                                            <div className="detail-section">
                                                                <div className="detail-label">
                                                                    <IcSpark
                                                                        size={
                                                                            11
                                                                        }
                                                                        style={{
                                                                            color: "var(--green)",
                                                                        }}
                                                                    />
                                                                    优化方案（
                                                                    {
                                                                        detail
                                                                            .solutions
                                                                            .length
                                                                    }{" "}
                                                                    个）
                                                                </div>
                                                                {detail.solutions.map(
                                                                    (
                                                                        sol,
                                                                        si,
                                                                    ) => (
                                                                        <div
                                                                            key={
                                                                                si
                                                                            }
                                                                            className="solution-item"
                                                                        >
                                                                            <div className="sol-name">
                                                                                方案{" "}
                                                                                {si +
                                                                                    1}

                                                                                ：
                                                                                {
                                                                                    sol.name
                                                                                }
                                                                                <span
                                                                                    className={`badge ${
                                                                                        sol.effort ===
                                                                                        "high"
                                                                                            ? "b-red"
                                                                                            : sol.effort ===
                                                                                                "medium"
                                                                                              ? "b-amber"
                                                                                              : "b-green"
                                                                                    }`}
                                                                                    style={{
                                                                                        marginLeft: 6,
                                                                                        fontSize:
                                                                                            ".6rem",
                                                                                    }}
                                                                                >
                                                                                    {sol.effort ||
                                                                                        "—"}
                                                                                </span>
                                                                            </div>
                                                                            <div className="sol-desc">
                                                                                {
                                                                                    sol.description
                                                                                }
                                                                            </div>
                                                                            {sol.steps &&
                                                                                sol
                                                                                    .steps
                                                                                    .length >
                                                                                    0 && (
                                                                                    <div
                                                                                        style={{
                                                                                            marginTop:
                                                                                                ".25rem",
                                                                                        }}
                                                                                    >
                                                                                        {sol.steps.map(
                                                                                            (
                                                                                                step,
                                                                                                stpi,
                                                                                            ) => (
                                                                                                <div
                                                                                                    key={
                                                                                                        stpi
                                                                                                    }
                                                                                                    className="sol-step"
                                                                                                    data-n={`${stpi + 1}.`}
                                                                                                >
                                                                                                    {
                                                                                                        step
                                                                                                    }
                                                                                                </div>
                                                                                            ),
                                                                                        )}
                                                                                    </div>
                                                                                )}
                                                                            {sol.expected_improvement && (
                                                                                <div className="sol-outcome">
                                                                                    预期效果:{" "}
                                                                                    {
                                                                                        sol.expected_improvement
                                                                                    }
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    ),
                                                                )}
                                                            </div>
                                                        )}

                                                    {/* References */}
                                                    {detail.references &&
                                                        detail.references
                                                            .length > 0 && (
                                                            <div className="detail-section">
                                                                <div className="detail-label">
                                                                    <IcList
                                                                        size={
                                                                            11
                                                                        }
                                                                        style={{
                                                                            color: "var(--blue)",
                                                                        }}
                                                                    />
                                                                    参考资料
                                                                </div>
                                                                {detail.references.map(
                                                                    (
                                                                        ref,
                                                                        ri,
                                                                    ) => (
                                                                        <div
                                                                            key={
                                                                                ri
                                                                            }
                                                                            className="xs"
                                                                            style={{
                                                                                fontFamily:
                                                                                    "var(--fm)",
                                                                                color: "var(--blue)",
                                                                                marginBottom: 2,
                                                                            }}
                                                                        >
                                                                            {typeof ref ===
                                                                            "string"
                                                                                ? ref
                                                                                : ref.url ||
                                                                                  ref.title ||
                                                                                  JSON.stringify(
                                                                                      ref,
                                                                                  )}
                                                                        </div>
                                                                    ),
                                                                )}
                                                            </div>
                                                        )}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                );
            }

            /* ── Empty state ──────────────────────────────────────── */
            function Empty({ icon, title, desc }) {
                return (
                    <div className="empty">
                        <div style={{ opacity: 0.4 }}>{icon}</div>
                        <div className="empty-t">{title}</div>
                        {desc && <div className="empty-d">{desc}</div>}
                    </div>
                );
            }

            /* ── Mount ───────────────────────────────────────────── */
            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
