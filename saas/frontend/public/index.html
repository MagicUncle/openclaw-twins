<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenClaw Twins v3.0</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ──────────────────────────────────────────────────────────────────
       OpenClaw Twins — Dark OLED + Real-Time Twin-Agent Monitoring
       Colors by ui-ux-pro-max: bg #020617 · card #0f172a · text #f1f5f9
       Fonts: Fira Code (mono/data) · Fira Sans (UI text)
    ────────────────────────────────────────────────────────────────── */
            :root {
                --bg: #020617;
                --bg-card: #0f172a;
                --bg-deep: #040d1a;
                --bg-surface: #1e293b;
                --border: rgba(148, 163, 184, 0.09);
                --border-md: rgba(148, 163, 184, 0.16);
                --border-hi: rgba(148, 163, 184, 0.28);
                --text: #f1f5f9;
                --text-2: #94a3b8;
                --text-3: #475569;
                --green: #22c55e;
                --green-d: rgba(34, 197, 94, 0.13);
                --red: #ef4444;
                --red-d: rgba(239, 68, 68, 0.13);
                --amber: #f59e0b;
                --amber-d: rgba(245, 158, 11, 0.13);
                --blue: #3b82f6;
                --blue-d: rgba(59, 130, 246, 0.13);
                --purple: #a855f7;
                --purple-d: rgba(168, 85, 247, 0.13);
                --cyan: #06b6d4;
                --cyan-d: rgba(6, 182, 212, 0.13);
                --sidebar-w: 236px;
                --topbar-h: 54px;
                --r: 10px;
                --r-sm: 6px;
                --t: 150ms ease;
                --ff: "Fira Sans", system-ui, sans-serif;
                --fm: "Fira Code", "Cascadia Code", monospace;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family: var(--ff);
                background: var(--bg);
                color: var(--text);
                line-height: 1.55;
                -webkit-font-smoothing: antialiased;
            }
            ::-webkit-scrollbar {
                width: 5px;
                height: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--bg-surface);
                border-radius: 99px;
            }

            /* ── Animations ──────────────────────────────────────── */
            @keyframes pulse-dot {
                0%,
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.4;
                    transform: scale(0.78);
                }
            }
            @keyframes ping {
                75%,
                100% {
                    transform: scale(2.3);
                    opacity: 0;
                }
            }
            @keyframes fade-up {
                from {
                    opacity: 0;
                    transform: translateY(9px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes bar-in {
                from {
                    width: 0;
                }
            }
            @keyframes num-in {
                from {
                    opacity: 0;
                    transform: translateY(5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .animate-in {
                animation: fade-up 0.26s ease both;
            }
            .spin {
                animation: spin 0.8s linear infinite;
            }

            /* ── Layout ──────────────────────────────────────────── */
            .layout {
                display: flex;
                min-height: 100vh;
            }

            /* ── Sidebar ─────────────────────────────────────────── */
            .sidebar {
                width: var(--sidebar-w);
                background: var(--bg-deep);
                border-right: 1px solid var(--border);
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 50;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .sb-logo {
                padding: 1.1rem 1.1rem 0.9rem;
                border-bottom: 1px solid var(--border);
            }
            .sb-logo-row {
                display: flex;
                align-items: center;
                gap: 0.6rem;
            }
            .sb-icon-box {
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: linear-gradient(135deg, #1d4ed8, #7c3aed);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .sb-name {
                font-size: 0.88rem;
                font-weight: 700;
                letter-spacing: -0.01em;
            }
            .sb-ver {
                font-size: 0.65rem;
                color: var(--text-3);
                font-family: var(--fm);
                margin-top: 1px;
            }
            .sb-nav {
                flex: 1;
                padding: 0.7rem 0.7rem;
                overflow-y: auto;
            }
            .sb-grp-label {
                font-size: 0.62rem;
                font-weight: 700;
                letter-spacing: 0.13em;
                text-transform: uppercase;
                color: var(--text-3);
                padding: 0.5rem 0.6rem 0.3rem;
            }
            .nav-btn {
                display: flex;
                align-items: center;
                gap: 0.65rem;
                padding: 0.52rem 0.7rem;
                border-radius: var(--r-sm);
                cursor: pointer;
                transition: all var(--t);
                color: var(--text-2);
                font-size: 0.835rem;
                font-weight: 500;
                border: 1px solid transparent;
                width: 100%;
                text-align: left;
                background: transparent;
                margin-bottom: 2px;
            }
            .nav-btn:hover {
                background: rgba(148, 163, 184, 0.06);
                color: var(--text);
            }
            .nav-btn.active {
                background: var(--blue-d);
                color: #60a5fa;
                border-color: rgba(59, 130, 246, 0.22);
            }
            .nav-btn.active .nav-sub {
                color: rgba(96, 165, 250, 0.6);
            }
            .nav-sub {
                font-size: 0.65rem;
                color: var(--text-3);
                margin-top: 1px;
            }
            .nav-icon {
                width: 16px;
                height: 16px;
                flex-shrink: 0;
                opacity: 0.75;
            }
            .nav-btn.active .nav-icon {
                opacity: 1;
            }

            .sb-footer {
                padding: 0.8rem 1rem;
                border-top: 1px solid var(--border);
                font-size: 0.72rem;
            }
            .live-chip {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                padding: 2px 8px;
                border-radius: 99px;
                font-size: 0.68rem;
                font-weight: 600;
                font-family: var(--fm);
                margin-bottom: 0.4rem;
            }
            .live-chip.on {
                background: var(--green-d);
                color: var(--green);
                border: 1px solid rgba(34, 197, 94, 0.25);
            }
            .live-chip.off {
                background: var(--amber-d);
                color: var(--amber);
                border: 1px solid rgba(245, 158, 11, 0.25);
            }
            .live-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: currentColor;
                position: relative;
                animation: pulse-dot 2s ease-in-out infinite;
            }
            .live-dot.on::after {
                content: "";
                position: absolute;
                inset: -3px;
                border-radius: 50%;
                background: var(--green);
                opacity: 0.22;
                animation: ping 2s ease-out infinite;
            }

            /* ── Main ────────────────────────────────────────────── */
            .main {
                margin-left: var(--sidebar-w);
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            /* ── Topbar ──────────────────────────────────────────── */
            .topbar {
                height: var(--topbar-h);
                background: rgba(2, 6, 23, 0.88);
                backdrop-filter: blur(14px);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.6rem;
                position: sticky;
                top: 0;
                z-index: 40;
            }
            .topbar-left {
                display: flex;
                align-items: center;
                gap: 0.45rem;
            }
            .topbar-crumb {
                font-size: 0.875rem;
                font-weight: 600;
            }
            .topbar-sep {
                color: var(--text-3);
                font-size: 0.75rem;
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 0.75rem;
            }
            .tb-time {
                font-family: var(--fm);
                font-size: 0.7rem;
                color: var(--text-3);
            }
            .icon-btn {
                width: 30px;
                height: 30px;
                border-radius: var(--r-sm);
                border: 1px solid var(--border-md);
                background: transparent;
                color: var(--text-2);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all var(--t);
            }
            .icon-btn:hover {
                background: var(--bg-surface);
                color: var(--text);
                border-color: var(--border-hi);
            }

            /* ── Content ─────────────────────────────────────────── */
            .content {
                padding: 1.6rem;
                flex: 1;
            }

            /* ── Page header ─────────────────────────────────────── */
            .page-hd {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                margin-bottom: 1.4rem;
            }
            .page-title {
                font-size: 1.15rem;
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            .page-sub {
                font-size: 0.74rem;
                color: var(--text-3);
                margin-top: 2px;
            }
            .page-meta {
                font-family: var(--fm);
                font-size: 0.69rem;
                color: var(--text-3);
                background: var(--bg-card);
                border: 1px solid var(--border);
                padding: 3px 9px;
                border-radius: var(--r-sm);
            }

            /* ── Cards ───────────────────────────────────────────── */
            .card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--r);
            }
            .card:hover {
                border-color: var(--border-md);
            }
            .card-hd {
                padding: 0.9rem 1.2rem 0.8rem;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .card-title {
                font-size: 0.79rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--text-3);
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }
            .card-body {
                padding: 1.2rem;
            }

            /* ── Stat cards ──────────────────────────────────────── */
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
                margin-bottom: 1.2rem;
            }
            .sc {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--r);
                padding: 1rem 1.1rem;
                position: relative;
                overflow: hidden;
                transition:
                    border-color var(--t),
                    transform var(--t);
            }
            .sc:hover {
                border-color: var(--border-md);
                transform: translateY(-1px);
            }
            .sc::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 3px;
                height: 100%;
                border-radius: 99px 0 0 99px;
            }
            .sc.c-green ::before,
            .sc.c-green::before {
                background: var(--green);
            }
            .sc.c-red ::before,
            .sc.c-red::before {
                background: var(--red);
            }
            .sc.c-amber ::before,
            .sc.c-amber::before {
                background: var(--amber);
            }
            .sc.c-blue ::before,
            .sc.c-blue::before {
                background: var(--blue);
            }
            .sc.c-purple ::before,
            .sc.c-purple::before {
                background: var(--purple);
            }
            .sc.c-cyan ::before,
            .sc.c-cyan::before {
                background: var(--cyan);
            }
            .sc.c-gray ::before,
            .sc.c-gray::before {
                background: var(--text-3);
            }
            .sc-label {
                font-size: 0.67rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--text-3);
                margin-bottom: 0.45rem;
            }
            .sc-val {
                font-family: var(--fm);
                font-size: 1.8rem;
                font-weight: 700;
                line-height: 1;
                letter-spacing: -0.03em;
                animation: num-in 0.4s ease both;
            }
            .sc.c-green .sc-val {
                color: #4ade80;
            }
            .sc.c-red .sc-val {
                color: #f87171;
            }
            .sc.c-amber .sc-val {
                color: #fbbf24;
            }
            .sc.c-blue .sc-val {
                color: #60a5fa;
            }
            .sc.c-purple .sc-val {
                color: #c084fc;
            }
            .sc.c-cyan .sc-val {
                color: #22d3ee;
            }
            .sc.c-gray .sc-val {
                color: var(--text-2);
            }
            .sc-bg-icon {
                position: absolute;
                bottom: 0.6rem;
                right: 0.8rem;
                opacity: 0.07;
                width: 32px;
                height: 32px;
                pointer-events: none;
            }

            /* ── Badges ──────────────────────────────────────────── */
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                padding: 2px 7px;
                border-radius: 99px;
                font-size: 0.67rem;
                font-weight: 700;
                letter-spacing: 0.025em;
                white-space: nowrap;
                font-family: var(--fm);
            }
            .b-green {
                background: var(--green-d);
                color: var(--green);
                border: 1px solid rgba(34, 197, 94, 0.22);
            }
            .b-red {
                background: var(--red-d);
                color: var(--red);
                border: 1px solid rgba(239, 68, 68, 0.22);
            }
            .b-amber {
                background: var(--amber-d);
                color: var(--amber);
                border: 1px solid rgba(245, 158, 11, 0.22);
            }
            .b-blue {
                background: var(--blue-d);
                color: var(--blue);
                border: 1px solid rgba(59, 130, 246, 0.22);
            }
            .b-purple {
                background: var(--purple-d);
                color: var(--purple);
                border: 1px solid rgba(168, 85, 247, 0.22);
            }
            .b-cyan {
                background: var(--cyan-d);
                color: var(--cyan);
                border: 1px solid rgba(6, 182, 212, 0.22);
            }
            .b-gray {
                background: rgba(148, 163, 184, 0.08);
                color: var(--text-2);
                border: 1px solid var(--border);
            }
            .b-orange {
                background: rgba(249, 115, 22, 0.12);
                color: #fb923c;
                border: 1px solid rgba(249, 115, 22, 0.22);
            }

            /* ── Table ───────────────────────────────────────────── */
            .tbl-wrap {
                overflow-x: auto;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.82rem;
            }
            thead th {
                font-size: 0.63rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text-3);
                padding: 0.65rem 1rem;
                border-bottom: 1px solid var(--border);
                text-align: left;
                background: #06101e;
                white-space: nowrap;
            }
            thead th.r {
                text-align: right;
            }
            thead th.c {
                text-align: center;
            }
            tbody td {
                padding: 0.65rem 1rem;
                border-bottom: 1px solid var(--border);
                vertical-align: middle;
                color: var(--text);
            }
            tbody td.r {
                text-align: right;
            }
            tbody td.c {
                text-align: center;
            }
            tbody tr:last-child td {
                border-bottom: none;
            }
            tbody tr:hover td {
                background: rgba(148, 163, 184, 0.025);
            }
            .mono {
                font-family: var(--fm);
                font-variant-numeric: tabular-nums;
            }

            /* ── Bars ────────────────────────────────────────────── */
            .bar-wrap {
                height: 5px;
                background: rgba(148, 163, 184, 0.09);
                border-radius: 99px;
                overflow: hidden;
            }
            .bar {
                height: 100%;
                border-radius: 99px;
                animation: bar-in 0.6s ease both;
                min-width: 2px;
            }
            .bar.g {
                background: var(--green);
            }
            .bar.r {
                background: var(--red);
            }
            .bar.a {
                background: var(--amber);
            }

            /* ── Alert items ─────────────────────────────────────── */
            .alert-item {
                border-left: 3px solid;
                border-radius: 0 var(--r-sm) var(--r-sm) 0;
                padding: 0.7rem 0.9rem;
                margin-bottom: 0.45rem;
            }
            .alert-item:last-child {
                margin-bottom: 0;
            }
            .ai-crit {
                border-color: var(--red);
                background: var(--red-d);
            }
            .ai-warn {
                border-color: var(--amber);
                background: var(--amber-d);
            }
            .ai-info {
                border-color: var(--blue);
                background: var(--blue-d);
            }
            .ai-ok {
                border-color: var(--green);
                background: var(--green-d);
            }
            .alert-hd {
                font-size: 0.78rem;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 0.35rem;
            }
            .alert-bd {
                font-size: 0.75rem;
                color: var(--text-2);
                margin-top: 2px;
            }
            .alert-src {
                font-size: 0.67rem;
                color: var(--text-3);
                margin-top: 2px;
                font-family: var(--fm);
            }

            /* ── Section label ───────────────────────────────────── */
            .sec-label {
                font-size: 0.66rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--text-3);
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 0.7rem;
            }
            .sec-label::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            /* ── Agent block ─────────────────────────────────────── */
            .agent-hd {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0.8rem 1rem;
                background: #06101e;
                border-bottom: 1px solid var(--border);
            }
            .agent-id {
                font-family: var(--fm);
                font-size: 0.88rem;
                font-weight: 700;
            }
            .agent-meta {
                font-size: 0.68rem;
                color: var(--text-3);
                font-family: var(--fm);
                margin-top: 1px;
            }

            /* ── Flow diagram ────────────────────────────────────── */
            .flow {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                row-gap: 0.6rem;
            }
            .flow-step {
                flex: 1;
                min-width: 80px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 0.65rem 0.5rem;
                background: var(--bg-surface);
                border: 1px solid var(--border);
                border-radius: var(--r-sm);
            }
            .flow-ico {
                margin-bottom: 3px;
            }
            .flow-t {
                font-size: 0.72rem;
                font-weight: 700;
            }
            .flow-d {
                font-size: 0.63rem;
                color: var(--text-3);
            }
            .flow-arr {
                color: var(--text-3);
                font-size: 1.1rem;
                padding: 0 3px;
                flex-shrink: 0;
            }

            /* ── Proposal card ───────────────────────────────────── */
            .prop-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--r);
                padding: 0.95rem 1.1rem;
                transition:
                    border-color var(--t),
                    transform var(--t);
            }
            .prop-card:hover {
                border-color: var(--border-md);
                transform: translateY(-1px);
            }
            .prop-title {
                font-size: 0.84rem;
                font-weight: 600;
                line-height: 1.4;
            }
            .prop-target {
                font-size: 0.68rem;
                color: var(--text-3);
                font-family: var(--fm);
                margin-top: 2px;
            }
            .prop-problem {
                font-size: 0.73rem;
                color: var(--text-2);
                background: rgba(148, 163, 184, 0.04);
                border: 1px solid var(--border);
                border-radius: var(--r-sm);
                padding: 0.35rem 0.6rem;
                margin: 0.45rem 0;
                font-family: var(--fm);
            }
            .btn-ok {
                font-size: 0.7rem;
                font-weight: 700;
                padding: 3px 9px;
                border-radius: 5px;
                cursor: pointer;
                font-family: var(--fm);
                border: 1px solid rgba(34, 197, 94, 0.3);
                background: var(--green-d);
                color: var(--green);
                transition: all var(--t);
            }
            .btn-ok:hover {
                background: rgba(34, 197, 94, 0.22);
            }
            .btn-ok:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            .btn-no {
                font-size: 0.7rem;
                font-weight: 700;
                padding: 3px 9px;
                border-radius: 5px;
                cursor: pointer;
                font-family: var(--fm);
                border: 1px solid rgba(239, 68, 68, 0.25);
                background: var(--red-d);
                color: var(--red);
                transition: all var(--t);
            }
            .btn-no:hover {
                background: rgba(239, 68, 68, 0.22);
            }
            .btn-no:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }

            /* ── Budget inline edit ──────────────────────────────── */
            .budget-edit-row {
                background: rgba(59, 130, 246, 0.04);
                border-top: 1px solid var(--blue-d);
            }
            .budget-edit-row td {
                padding: 0.55rem 1rem;
            }
            .limit-input {
                background: var(--bg-surface);
                border: 1px solid var(--border-md);
                border-radius: var(--r-sm);
                color: var(--text);
                font-family: var(--fm);
                font-size: 0.78rem;
                padding: 4px 8px;
                width: 110px;
                outline: none;

            async function apiLogin() {
                const r = await fetch(`${API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: ADMIN_EMAIL,
                        password: ADMIN_PASS,
                    }),
                });
                if (!r.ok) throw new Error(`Login HTTP ${r.status}`);
                return (await r.json()).access_token;
            }
            async function apiFetch(path, tok) {
                const r = await fetch(`${API_BASE}${path}`, {
                    headers: { Authorization: `Bearer ${tok}` },
                });
                if (r.status === 401) throw new Error("UNAUTHORIZED");
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();

            /* ════════════════════════════════════════════════════════
       ROOT APP
    ════════════════════════════════════════════════════════ */
            function App() {
                const [token, setToken] = useState(null);
                const [snapshot, setSnapshot] = useState(null);
                const [proposals, setProposals] = useState([]);
                const [sysStatus, setSysStatus] = useState(null);
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);
                const [lastUpdate, setLastUpdate] = useState(null);
                const [refreshCnt, setRefreshCnt] = useState(0);
                const [realtimeOn, setRealtimeOn] = useState(false);
                const [activeTab, setActiveTab] = useState("overview");
                const [refreshing, setRefreshing] = useState(false);
                const tokenRef = useRef(null);
                const sseRef = useRef(null);

                useEffect(() => {
                    tokenRef.current = token;
                }, [token]);

                /* SSE */
                const connectSSE = useCallback((tok) => {
                    if (!tok) return;
                    if (sseRef.current) {
                        sseRef.current.close();
                        sseRef.current = null;
                    }
                    let alive = true;
                    (async () => {
                        try {
                            const res = await fetch(
                                `${API_BASE}/system/stream`,
                                {
                                    headers: { Authorization: `Bearer ${tok}` },
                                },
                            );
                            if (!res.ok || !res.body) return;
                            setRealtimeOn(true);
                            const rdr = res.body.getReader(),
                                dec = new TextDecoder();
                            let buf = "";
                            while (alive) {
                                const { value, done } = await rdr.read();
                                if (done) break;
                                buf += dec.decode(value, { stream: true });
                                const lines = buf.split("\n");
                                buf = lines.pop() || "";
                                for (const ln of lines) {
                                    if (ln.startsWith("data: ")) {
                                        try {
                                            const snap = JSON.parse(
                                                ln.slice(6),
                                            );
                                            setSnapshot(snap);
                                            setLastUpdate(new Date());
                                            setRefreshCnt((c) => c + 1);
                                            setError(null);
                                            setLoading(false);
                                        } catch (_) {}
                                    }
                                }
                            }
                        } catch (e) {
                            if (alive) {
                                setRealtimeOn(false);
                            }
                        }
                    })();
                    sseRef.current = {
                        close: () => {
                            alive = false;
                        },
                    };
                }, []);

                /* Load data */
                const loadData = useCallback(async (currentTok) => {
                    let tok = currentTok ?? tokenRef.current;
                    try {
                        if (!tok) {
                            tok = await apiLogin();
                            setToken(tok);
                            tokenRef.current = tok;
                        }
                        const [snapR, propsR, sysR] = await Promise.allSettled([
                            apiFetch("/system/snapshot", tok),
                            apiFetch("/proposals/all", tok),
                            apiFetch("/system/status", tok),
                        ]);
                        if (snapR.status === "fulfilled") {
                            setSnapshot(snapR.value);
                        } else if (snapR.reason?.message === "UNAUTHORIZED") {
                            const ntok = await apiLogin();
                            setToken(ntok);
                            tokenRef.current = ntok;
                            return loadData(ntok);
                        } else
                            throw new Error(
                                "快照获取失败: " +
                                    (snapR.reason?.message || "unknown"),
                            );
                        if (propsR.status === "fulfilled") {
                            setProposals(propsR.value.proposals || []);
                        }
                        if (sysR.status === "fulfilled") {
                            setSysStatus(sysR.value);
                        }
                        setLastUpdate(new Date());
                        setRefreshCnt((c) => c + 1);
                        setError(null);
                    } catch (e) {
                        setError(e.message);
                    } finally {
                        setLoading(false);
                        setRefreshing(false);
                    }
                }, []);

                /* Bootstrap */
                useEffect(() => {
                    loadData(null).then(() => {
                        if (tokenRef.current) connectSSE(tokenRef.current);
                    });
                    const id = setInterval(() => {
                        if (!realtimeOn) loadData(null);
                    }, POLL_MS);
                    return () => {
                        clearInterval(id);
                        sseRef.current?.close();
                    };

                                                                        <td className="r mono">
                                                                            {fmtTok(
                                                                                s.tokens_total,

                                                </table>
                                            </div>
                                        </div>
                                    );
                                },
                            )}
                        </div>
                    </div>
                );
            }

            /* ════════════════════════════════════════════════════════

                    {
