# OpenClaw Twins - Docker Compose Configuration
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    image: openclaw-twins-backend:${VERSION:-latest}
    container_name: twins-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///app/data/twins.db
      - LOG_LEVEL=info
      - TWIN_OVERSEER_ENABLED=true
      - TWIN_ARCHITECT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    volumes:
      - twins-data:/app/data
      - twins-metrics:/app/metrics
      - twins-agents:/app/agents
    networks:
      - twins-network
    # Simple healthcheck with curl
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    image: openclaw-twins-frontend:${VERSION:-latest}
    container_name: twins-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - twins-network

volumes:
  twins-data:
    driver: local
  twins-metrics:
    driver: local
  twins-agents:
    driver: local

networks:
  twins-network:
    driver: bridge
