# OpenClaw Twins - Docker Compose Configuration
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    image: openclaw-twins-backend:${VERSION:-latest}
    container_name: twins-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///app/data/twins.db
      - LOG_LEVEL=info
      - TWIN_OVERSEER_ENABLED=true
      - TWIN_ARCHITECT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    volumes:
      - twins-data:/app/data
      - twins-metrics:/app/metrics
      - twins-agents:/app/agents
    networks:
      - twins-network
    # Simplified healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    image: openclaw-twins-frontend:${VERSION:-latest}
    container_name: twins-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    # Remove condition, just wait for backend to exist
    depends_on:
      - backend
    networks:
      - twins-network

volumes:
  twins-data:
    driver: local
  twins-metrics:
    driver: local
  twins-agents:
    driver: local

networks:
  twins-network:
    driver: bridge
