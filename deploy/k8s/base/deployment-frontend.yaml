apiVersion: apps/v1
kind: Deployment
metadata:
  name: twins-frontend
  namespace: openclaw-twins
  labels:
    app: twins-frontend
    component: web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: twins-frontend
  template:
    metadata:
      labels:
        app: twins-frontend
        component: web
    spec:
      containers:
        - name: frontend
          image: ghcr.io/yourname/openclaw-twins-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
