apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twins-data-pvc
  namespace: openclaw-twins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twins-metrics-pvc
  namespace: openclaw-twins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
