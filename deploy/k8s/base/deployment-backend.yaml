apiVersion: apps/v1
kind: Deployment
metadata:
  name: twins-backend
  namespace: openclaw-twins
  labels:
    app: twins-backend
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: twins-backend
  template:
    metadata:
      labels:
        app: twins-backend
        component: api
    spec:
      containers:
        - name: backend
          image: ghcr.io/yourname/openclaw-twins-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: twins-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: twins-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: metrics
              mountPath: /app/metrics
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: twins-data-pvc
        - name: metrics
          persistentVolumeClaim:
            claimName: twins-metrics-pvc
