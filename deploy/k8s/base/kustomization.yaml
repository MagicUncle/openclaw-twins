apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openclaw-twins

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment-backend.yaml
  - deployment-frontend.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: openclaw-twins
  app.kubernetes.io/version: v3.0.0

images:
  - name: ghcr.io/yourname/openclaw-twins-backend
    newTag: v3.0.0
  - name: ghcr.io/yourname/openclaw-twins-frontend
    newTag: v3.0.0
