name: CI - Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          pip install ruff black isort

      - name: Run Ruff
        run: ruff check src/ || true
        continue-on-error: true

      - name: Run Black check
        run: black --check src/ || true
        continue-on-error: true

      - name: Run isort check
        run: isort --check-only src/ || true
        continue-on-error: true

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd saas/backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd saas/backend
          pytest tests/ -v --tb=short || true
        continue-on-error: true

  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check frontend files exist
        run: |
          test -f saas/frontend/public/index.html && echo "✅ Frontend files verified"

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile.backend
          push: false
          tags: openclaw-twins:backend-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openclaw-twins:backend-test
          format: "sarif"
          output: "trivy-results.sarif"
        continue-on-error: true

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cd deploy/docker
          docker compose -f docker-compose.yml up -d
          echo "⏳ Waiting for backend to start..."
          sleep 30

      - name: Health check with retry
        run: |
          # Retry health check up to 10 times
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -sf http://localhost:8000/health; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "Retrying in 5 seconds..."
            sleep 5
          done
          echo "❌ Backend health check failed after 10 attempts"
          echo "=== Backend logs ==="
          docker logs twins-backend || true
          echo "=== Docker ps ==="
          docker ps -a
          exit 1

      - name: Cleanup
        if: always()
        run: |
          cd deploy/docker
          docker compose down -v
