<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时字幕翻译 - 控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .card h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-right: 10px;
        }
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .btn-primary:hover {
            background: #00a8cc;
        }
        .btn-danger {
            background: #e94560;
            color: white;
        }
        .btn-danger:hover {
            background: #c73e54;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.running {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .status.stopped {
            background: #666;
            color: #fff;
        }
        .subtitle-display {
            background: #0f3460;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
        }
        .subtitle-original {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .subtitle-translated {
            color: #00d4ff;
            font-size: 24px;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .info {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 实时字幕翻译</h1>
        
        <!-- 状态和控制 -->
        <div class="card">
            <h2>📊 运行状态</h2>
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div>
                    状态: <span id="status" class="status stopped">已停止</span>
                </div>
                <div>
                    <button id="btnStart" class="btn btn-primary">▶ 开始翻译</button>
                    <button id="btnStop" class="btn btn-danger" disabled>⏹ 停止</button>
                </div>
            </div>
        </div>
        
        <!-- 实时字幕 -->
        <div class="card">
            <h2>📺 实时字幕</h2>
            <div class="subtitle-display">
                <div class="subtitle-original" id="subtitleOriginal">等待开始...</div>
                <div class="subtitle-translated" id="subtitleTranslated">-</div>
            </div>
        </div>
        
        <!-- 配置 -->
        <div class="card">
            <h2>⚙️ 翻译设置</h2>
            <div class="grid">
                <div class="form-group">
                    <label>翻译引擎</label>
                    <select id="translator">
                        <option value="local">🖥️ 本地模型 (Helsinki-NLP)</option>
                        <option value="google">🌐 Google 翻译</option>
                        <option value="deepl">🧠 DeepL 翻译</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Whisper 模型</label>
                    <select id="whisperModel">
                        <option value="base">base - 平衡 (141MB)</option>
                        <option value="tiny">tiny - 最快 (39MB)</option>
                        <option value="small">small - 更好 (466MB)</option>
                        <option value="medium">medium - 最佳 (1.5GB)</option>
                    </select>
                </div>
            </div>
            
            <div class="grid">
                <div class="form-group">
                    <label>源语言</label>
                    <select id="sourceLang">
                        <option value="auto">🌍 自动检测</option>
                        <option value="en">🇺🇸 英语</option>
                        <option value="ja">🇯🇵 日语</option>
                        <option value="ko">🇰🇷 韩语</option>
                        <option value="fr">🇫🇷 法语</option>
                        <option value="de">🇩🇪 德语</option>
                        <option value="es">🇪🇸 西班牙语</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标语言</label>
                    <select id="targetLang">
                        <option value="zh">🇨🇳 中文</option>
                        <option value="en">🇺🇸 英语</option>
                        <option value="ja">🇯🇵 日语</option>
                    </select>
                </div>
            </div>
            
            <!-- DeepL API Key (默认隐藏) -->
            <div id="deeplConfig" class="hidden">
                <div class="form-group">
                    <label>DeepL API Key</label>
                    <input type="password" id="deeplApiKey" placeholder="输入你的 DeepL API Key">
                    <div class="info">💡 免费版每月 50万字符额度，注册地址: deepl.com/pro-api</div>
                </div>
            </div>
            
            <!-- 代理设置 (默认隐藏) -->
            <div id="googleConfig" class="hidden">
                <div class="form-group">
                    <label>代理地址 (可选)</label>
                    <input type="text" id="proxy" placeholder="http://127.0.0.1:7890">
                    <div class="info">💡 如果无法访问 Google，请设置本地代理</div>
                </div>
            </div>
            
            <button id="btnSave" class="btn btn-primary">💾 保存设置</button>
        </div>
        
        <!-- 本地模型信息 -->
        <div class="card" id="localModelCard">
            <h2>📦 本地模型</h2>
            <div id="modelList">
                <p>加载中...</p>
            </div>
            <div class="info">
                💡 模型文件存放在: ~/.local/share/whisper/<br>
                如需更多模型，可从 <a href="https://huggingface.co/ggerganov/whisper.cpp/tree/main" target="_blank" style="color: #00d4ff;">HuggingFace</a> 下载
            </div>
        </div>
    </div>

    <script>
        // 加载配置
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                
                document.getElementById('translator').value = config.translator;
                document.getElementById('whisperModel').value = config.whisper_model;
                document.getElementById('sourceLang').value = config.source_lang;
                document.getElementById('targetLang').value = config.target_lang;
                document.getElementById('deeplApiKey').value = config.deepl_api_key || '';
                document.getElementById('proxy').value = config.proxy || '';
                
                updateUI(config.translator);
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }
        
        // 加载模型列表
        async function loadModels() {
            try {
                const res = await fetch('/api/models');
                const models = await res.json();
                const list = document.getElementById('modelList');
                if (models.length === 0) {
                    list.innerHTML = '<p style="color: #e94560;">⚠️ 未找到本地模型，请先下载模型文件</p>';
                } else {
                    list.innerHTML = models.map(m => `<span class="status" style="margin-right: 10px; margin-bottom: 5px; display: inline-block;">${m}</span>`).join('');
                }
            } catch (e) {
                console.error('加载模型失败:', e);
            }
        }
        
        // 更新 UI 显示
        function updateUI(translator) {
            document.getElementById('deeplConfig').classList.toggle('hidden', translator !== 'deepl');
            document.getElementById('googleConfig').classList.toggle('hidden', translator !== 'google');
            document.getElementById('localModelCard').classList.toggle('hidden', translator !== 'local');
        }
        
        // 监听翻译引擎切换
        document.getElementById('translator').addEventListener('change', (e) => {
            updateUI(e.target.value);
        });
        
        // 保存配置
        document.getElementById('btnSave').addEventListener('click', async () => {
            const config = {
                translator: document.getElementById('translator').value,
                whisper_model: document.getElementById('whisperModel').value,
                source_lang: document.getElementById('sourceLang').value,
                target_lang: document.getElementById('targetLang').value,
                deepl_api_key: document.getElementById('deeplApiKey').value,
                proxy: document.getElementById('proxy').value,
            };
            
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                alert('✅ 设置已保存');
            } catch (e) {
                alert('❌ 保存失败: ' + e.message);
            }
        });
        
        // 开始翻译
        document.getElementById('btnStart').addEventListener('click', async () => {
            try {
                await fetch('/api/start', {method: 'POST'});
                updateStatus(true);
                startSSE();
            } catch (e) {
                alert('❌ 启动失败: ' + e.message);
            }
        });
        
        // 停止翻译
        document.getElementById('btnStop').addEventListener('click', async () => {
            try {
                await fetch('/api/stop', {method: 'POST'});
                updateStatus(false);
            } catch (e) {
                alert('❌ 停止失败: ' + e.message);
            }
        });
        
        // 更新状态显示
        function updateStatus(running) {
            const status = document.getElementById('status');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            
            if (running) {
                status.textContent = '运行中';
                status.className = 'status running';
                btnStart.disabled = true;
                btnStop.disabled = false;
            } else {
                status.textContent = '已停止';
                status.className = 'status stopped';
                btnStart.disabled = false;
                btnStop.disabled = true;
            }
        }
        
        // SSE 接收实时字幕
        let eventSource;
        function startSSE() {
            if (eventSource) eventSource.close();
            
            eventSource = new EventSource('/api/subtitle/stream');
            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                document.getElementById('subtitleOriginal').textContent = data.original || '识别中...';
                document.getElementById('subtitleTranslated').textContent = data.translated || '翻译中...';
            };
        }
        
        // 定期检查状态
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateStatus(data.running);
                if (data.running && data.subtitle.timestamp) {
                    document.getElementById('subtitleOriginal').textContent = data.subtitle.original;
                    document.getElementById('subtitleTranslated').textContent = data.subtitle.translated;
                }
            } catch (e) {
                console.error('检查状态失败:', e);
            }
        }
        
        // 初始化
        loadConfig();
        loadModels();
        setInterval(checkStatus, 1000);
        // 尝试连接 SSE
        setTimeout(() => {
            if (document.getElementById('status').classList.contains('running')) {
                startSSE();
            }
        }, 2000);
    </script>
</body>
</html>
